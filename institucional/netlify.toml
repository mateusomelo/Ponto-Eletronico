# ─────────────────────────────────────────────────────────────────────────────
# NETLIFY — PontoControl (Site Institucional)
#
# Este e um site ESTATICO separado do sistema de gestao (frontend/).
# Para publicar: crie um NOVO site no Netlify apontando para este
# repositorio, com "Base directory" = institucional e "Publish directory"
# = institucional/public (sem comando de build — e so HTML/CSS/JS estatico).
#
# Dominio recomendado: pontocontrol.com.br (este site institucional)
#                       app.pontocontrol.com.br ou sistema.pontocontrol.com.br
#                       (aponta para o site do sistema de gestao, em /frontend)
# ─────────────────────────────────────────────────────────────────────────────

[build]
  publish = "public"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
