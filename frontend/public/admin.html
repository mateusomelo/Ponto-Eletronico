<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Admin — Ponto Eletrônico</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.2.0/css/all.min.css" />
  <link rel="stylesheet" href="css/main.css" />
  <style>
    .admin-header {
      background: linear-gradient(135deg, #1e3a5f 0%, #3b82f6 100%);
      color: #fff;
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .admin-header h1 { font-size: 1.4rem; margin: 0; }
    .admin-header .subtitle { font-size: .85rem; opacity: .8; margin-top: 2px; }
    .admin-content { padding: 24px; max-width: 1100px; margin: 0 auto; }
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; }
    .stat-card .stat-num { font-size: 2rem; font-weight: 700; color: #1e3a5f; }
    .stat-card .stat-label { font-size: .8rem; color: var(--text-muted); margin-top: 4px; }
    .status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: .75rem; font-weight: 600; }
    .s-active    { background: #dcfce7; color: #16a34a; }
    .s-past_due  { background: #fef3c7; color: #d97706; }
    .s-suspended { background: #fee2e2; color: #dc2626; }
    .empresa-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .empresa-info { flex: 1; min-width: 0; }
    .empresa-nome { font-weight: 600; font-size: .95rem; }
    .empresa-meta { font-size: .78rem; color: var(--text-muted); margin-top: 2px; }
    .btn-xs { padding: 4px 10px; font-size: .75rem; }
    .actions-group { display: flex; gap: 6px; flex-wrap: wrap; }
    .user-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .user-row:last-child { border-bottom: none; }
    .user-info { flex: 1; min-width: 0; }
    .user-nome { font-weight: 600; font-size: .88rem; }
    .user-meta { font-size: .75rem; color: var(--text-muted); margin-top: 2px; }
    .role-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 12px; font-size: .7rem; font-weight: 600; }
    .role-company_admin { background: #dbeafe; color: #1d4ed8; }
    .role-employee      { background: #f3f4f6; color: #374151; }
  </style>
</head>
<body style="background:#f1f5f9;min-height:100vh">

<div class="admin-header">
  <div>
    <h1><i class="fas fa-crown" style="margin-right:10px;color:#fbbf24"></i>Super Admin — Painel da Plataforma</h1>
    <div class="subtitle" id="adminSubtitle">Carregando...</div>
  </div>
  <div style="display:flex;gap:10px;align-items:center">
    <button class="btn btn-outline" id="btnNovaEmpresa" style="background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.3)">
      <i class="fas fa-plus"></i> Nova Empresa
    </button>
    <button class="btn btn-outline" id="btnLogout" style="background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.3)">
      <i class="fas fa-sign-out-alt"></i> Sair
    </button>
  </div>
</div>

<div class="admin-content">
  <!-- Stats -->
  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="stat-num" id="stTotal">-</div><div class="stat-label">Empresas Total</div></div>
    <div class="stat-card"><div class="stat-num" id="stActive" style="color:#16a34a">-</div><div class="stat-label">Ativas</div></div>
    <div class="stat-card"><div class="stat-num" id="stPastDue" style="color:#d97706">-</div><div class="stat-label">Em Atraso</div></div>
    <div class="stat-card"><div class="stat-num" id="stSuspended" style="color:#dc2626">-</div><div class="stat-label">Suspensas</div></div>
    <div class="stat-card"><div class="stat-num" id="stUsuarios">-</div><div class="stat-label">Total de Usuários</div></div>
  </div>

  <!-- Lista de empresas -->
  <div class="card">
    <div class="card-header">
      <span class="card-title"><i class="fas fa-building" style="color:#3b82f6"></i> Empresas Cadastradas</span>
    </div>
    <div id="listaEmpresas"><div class="page-loader"><span class="spinner"></span></div></div>
  </div>
</div>

<!-- Modal nova/editar empresa -->
<div class="modal-overlay" id="modalEmpresa">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <h3 class="modal-title" id="modalEmpresaTitulo"><i class="fas fa-building"></i> Nova Empresa</h3>
      <button class="modal-close" onclick="closeModal('modalEmpresa')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="empId" />
      <div class="form-group">
        <label class="form-label">Nome da Empresa *</label>
        <input type="text" class="form-control" id="empNome" placeholder="Ex: Acme Ltda" />
      </div>
      <div class="form-row" style="grid-template-columns:1fr 1fr">
        <div class="form-group">
          <label class="form-label">CNPJ</label>
          <input type="text" class="form-control" id="empCnpj" placeholder="00.000.000/0001-00" />
        </div>
        <div class="form-group">
          <label class="form-label">Plano</label>
          <select class="form-control" id="empPlano">
            <option value="basico">Básico</option>
            <option value="profissional">Profissional</option>
            <option value="enterprise">Enterprise</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">E-mail de contato</label>
        <input type="email" class="form-control" id="empEmail" placeholder="contato@empresa.com" />
      </div>
      <div class="form-group">
        <label class="form-label">Telefone</label>
        <input type="text" class="form-control" id="empTelefone" placeholder="(11) 99999-9999" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modalEmpresa')">Cancelar</button>
      <button class="btn btn-primary" id="btnSalvarEmpresa"><i class="fas fa-save"></i> Salvar</button>
    </div>
  </div>
</div>

<!-- Modal usuários da empresa -->
<div class="modal-overlay" id="modalUsuarios">
  <div class="modal" style="max-width:600px">
    <div class="modal-header">
      <h3 class="modal-title" id="modalUsuariosTitulo"><i class="fas fa-users"></i> Usuários</h3>
      <button class="modal-close" onclick="closeModal('modalUsuarios')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" style="max-height:60vh;overflow-y:auto">
      <div id="listaUsuariosEmpresa"><div class="page-loader"><span class="spinner"></span></div></div>
    </div>
    <div class="modal-footer" style="justify-content:space-between">
      <button class="btn btn-primary" id="btnNovoUsuarioEmpresa"><i class="fas fa-plus"></i> Novo Usuário</button>
      <button class="btn btn-outline" onclick="closeModal('modalUsuarios')">Fechar</button>
    </div>
  </div>
</div>

<!-- Modal criar usuário numa empresa -->
<div class="modal-overlay" id="modalCriarUsuario">
  <div class="modal" style="max-width:440px">
    <div class="modal-header">
      <h3 class="modal-title"><i class="fas fa-user-plus"></i> Novo Usuário</h3>
      <button class="modal-close" onclick="closeModal('modalCriarUsuario')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="novoUserEmpresaId" />
      <div class="form-group">
        <label class="form-label">Nome *</label>
        <input type="text" class="form-control" id="novoUserNome" placeholder="Nome completo" />
      </div>
      <div class="form-group">
        <label class="form-label">E-mail *</label>
        <input type="email" class="form-control" id="novoUserEmail" placeholder="email@empresa.com" />
      </div>
      <div class="form-group">
        <label class="form-label">Senha *</label>
        <input type="password" class="form-control" id="novoUserSenha" placeholder="Mínimo 8 caracteres" />
      </div>
      <div class="form-group">
        <label class="form-label">Perfil</label>
        <select class="form-control" id="novoUserRole">
          <option value="company_admin">Administrador da empresa</option>
          <option value="employee">Funcionário</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modalCriarUsuario')">Cancelar</button>
      <button class="btn btn-primary" id="btnSalvarNovoUser"><i class="fas fa-save"></i> Criar</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  if (!Auth.getToken()) { window.location.href = '/index.html'; return; }

  const user = Auth.getUsuario();
  if (!user || user.role !== 'super_admin') {
    window.location.href = '/dashboard.html';
    return;
  }

  document.getElementById('adminSubtitle').textContent = `Logado como ${user.nome} • ${user.email}`;
  await carregarEmpresas();
});

let _empresas = [];

async function carregarEmpresas() {
  try {
    _empresas = await API.get('/empresas');
    renderStats(_empresas);
    renderEmpresas(_empresas);
  } catch (err) {
    toast(err.data?.erro || 'Erro ao carregar empresas.', 'error');
  }
}

function renderStats(list) {
  document.getElementById('stTotal').textContent     = list.length;
  document.getElementById('stActive').textContent    = list.filter(e => e.status === 'active').length;
  document.getElementById('stPastDue').textContent   = list.filter(e => e.status === 'past_due').length;
  document.getElementById('stSuspended').textContent = list.filter(e => e.status === 'suspended').length;
  document.getElementById('stUsuarios').textContent  = list.reduce((a, e) => a + (e.total_usuarios || 0), 0);
}

const statusLabel = { active: 'Ativa', past_due: 'Em Atraso', suspended: 'Suspensa' };

function renderEmpresas(list) {
  const el = document.getElementById('listaEmpresas');
  if (!list.length) {
    el.innerHTML = '<div class="table-empty">Nenhuma empresa cadastrada.</div>';
    return;
  }
  el.innerHTML = `<div style="padding:12px 0">` + list.map(e => `
    <div style="padding:14px 20px;border-bottom:1px solid var(--border)">
      <div class="empresa-row">
        <div class="empresa-info">
          <div class="empresa-nome">${e.nome}</div>
          <div class="empresa-meta">
            ${e.cnpj ? `CNPJ: ${e.cnpj} &nbsp;·&nbsp;` : ''}
            Plano: <strong>${e.plano}</strong> &nbsp;·&nbsp;
            ${e.total_usuarios || 0} usuário(s) &nbsp;·&nbsp;
            ${e.total_registros || 0} registros &nbsp;·&nbsp;
            desde ${new Date(e.criado_em).toLocaleDateString('pt-BR')}
          </div>
        </div>
        <span class="status-badge s-${e.status}">${statusLabel[e.status] || e.status}</span>
        <div class="actions-group">
          <button class="btn btn-xs btn-outline" onclick="abrirEdicao(${e.id})"><i class="fas fa-edit"></i></button>
          ${e.status !== 'active'     ? `<button class="btn btn-xs btn-outline" style="color:#16a34a" onclick="mudarStatus(${e.id},'active')"><i class="fas fa-check"></i> Ativar</button>` : ''}
          ${e.status !== 'past_due'   ? `<button class="btn btn-xs btn-outline" style="color:#d97706" onclick="mudarStatus(${e.id},'past_due')"><i class="fas fa-clock"></i> Atraso</button>` : ''}
          ${e.status !== 'suspended'  ? `<button class="btn btn-xs btn-outline" style="color:#dc2626" onclick="mudarStatus(${e.id},'suspended')"><i class="fas fa-ban"></i> Suspender</button>` : ''}
          <button class="btn btn-xs btn-outline" style="color:#6366f1" onclick="abrirUsuarios(${e.id},'${e.nome.replace(/'/g,"\\'")}')"><i class="fas fa-users"></i> Usuários</button>
          ${e.id > 1 ? `<button class="btn btn-xs btn-danger" onclick="excluirEmpresa(${e.id},'${e.nome.replace(/'/g,"\\'")}')"><i class="fas fa-trash"></i></button>` : ''}
        </div>
      </div>
    </div>`).join('') + '</div>';
}

async function mudarStatus(id, status) {
  try {
    await API.patch(`/empresas/${id}/status`, { status });
    toast('Status alterado!', 'success');
    await carregarEmpresas();
  } catch (err) { toast(err.data?.erro || 'Erro.', 'error'); }
}

async function excluirEmpresa(id, nome) {
  const ok = await confirmDialog(`Excluir a empresa "<strong>${nome}</strong>" e todos os seus dados? Esta ação não pode ser desfeita.`);
  if (!ok) return;
  try {
    await API.delete(`/empresas/${id}`);
    toast('Empresa excluída.', 'success');
    await carregarEmpresas();
  } catch (err) { toast(err.data?.erro || 'Erro.', 'error'); }
}

function abrirNova() {
  document.getElementById('empId').value       = '';
  document.getElementById('empNome').value     = '';
  document.getElementById('empCnpj').value     = '';
  document.getElementById('empEmail').value    = '';
  document.getElementById('empTelefone').value = '';
  document.getElementById('empPlano').value    = 'basico';
  document.getElementById('modalEmpresaTitulo').innerHTML = '<i class="fas fa-plus"></i> Nova Empresa';
  openModal('modalEmpresa');
}

function abrirEdicao(id) {
  const e = _empresas.find(x => x.id === id);
  if (!e) return;
  document.getElementById('empId').value       = e.id;
  document.getElementById('empNome').value     = e.nome;
  document.getElementById('empCnpj').value     = e.cnpj || '';
  document.getElementById('empEmail').value    = e.email || '';
  document.getElementById('empTelefone').value = e.telefone || '';
  document.getElementById('empPlano').value    = e.plano || 'basico';
  document.getElementById('modalEmpresaTitulo').innerHTML = '<i class="fas fa-edit"></i> Editar Empresa';
  openModal('modalEmpresa');
}

document.getElementById('btnNovaEmpresa').addEventListener('click', abrirNova);

document.getElementById('btnSalvarEmpresa').addEventListener('click', async () => {
  const id   = document.getElementById('empId').value;
  const body = {
    nome:     document.getElementById('empNome').value.trim(),
    cnpj:     document.getElementById('empCnpj').value.trim(),
    email:    document.getElementById('empEmail').value.trim(),
    telefone: document.getElementById('empTelefone').value.trim(),
    plano:    document.getElementById('empPlano').value,
  };
  if (!body.nome) { toast('Nome é obrigatório.', 'error'); return; }
  const btn = document.getElementById('btnSalvarEmpresa');
  btn.disabled = true;
  try {
    if (id) await API.put(`/empresas/${id}`, body);
    else    await API.post('/empresas', body);
    closeModal('modalEmpresa');
    toast(id ? 'Empresa atualizada!' : 'Empresa criada!', 'success');
    await carregarEmpresas();
  } catch (err) { toast(err.data?.erro || 'Erro ao salvar.', 'error'); }
  finally { btn.disabled = false; }
});

document.getElementById('btnLogout').addEventListener('click', async () => {
  try { await API.post('/auth/logout'); } catch {}
  Auth.clearToken();
  window.location.href = '/index.html';
});

// ── Gestão de usuários por empresa ──────────────────────────
let _empresaAtualId = null;

async function abrirUsuarios(empresaId, empresaNome) {
  _empresaAtualId = empresaId;
  document.getElementById('modalUsuariosTitulo').innerHTML =
    `<i class="fas fa-users"></i> Usuários — ${empresaNome}`;
  document.getElementById('listaUsuariosEmpresa').innerHTML =
    '<div class="page-loader"><span class="spinner"></span></div>';
  openModal('modalUsuarios');
  await recarregarUsuariosEmpresa();
}

async function recarregarUsuariosEmpresa() {
  try {
    const data = await API.get(`/empresas/${_empresaAtualId}/usuarios`);
    const el = document.getElementById('listaUsuariosEmpresa');
    if (!data.usuarios.length) {
      el.innerHTML = '<div class="table-empty" style="padding:20px">Nenhum usuário cadastrado nesta empresa.</div>';
      return;
    }
    const roleLabel = { company_admin: 'Admin', employee: 'Funcionário', super_admin: 'Super Admin' };
    el.innerHTML = data.usuarios.map(u => `
      <div class="user-row">
        <div class="user-info">
          <div class="user-nome">${u.nome}</div>
          <div class="user-meta">${u.email} &nbsp;·&nbsp; ${u.cargo_nome || '-'}</div>
        </div>
        <span class="role-badge role-${u.role}">${roleLabel[u.role] || u.role}</span>
        <span style="font-size:.75rem;color:${u.ativo ? '#16a34a' : '#dc2626'}">${u.ativo ? 'Ativo' : 'Inativo'}</span>
        <button class="btn btn-xs btn-danger" onclick="excluirUsuarioEmpresa(${u.id},'${u.nome.replace(/'/g,"\\'")}')">
          <i class="fas fa-trash"></i>
        </button>
      </div>`).join('');
  } catch (err) {
    document.getElementById('listaUsuariosEmpresa').innerHTML =
      '<div class="table-empty" style="color:#dc2626;padding:20px">Erro ao carregar usuários.</div>';
  }
}

async function excluirUsuarioEmpresa(uid, nome) {
  const ok = await confirmDialog(`Excluir o usuário <strong>${nome}</strong>? Esta ação não pode ser desfeita.`);
  if (!ok) return;
  try {
    await API.delete(`/empresas/${_empresaAtualId}/usuarios/${uid}`);
    toast('Usuário excluído.', 'success');
    await recarregarUsuariosEmpresa();
    await carregarEmpresas();
  } catch (err) { toast(err.data?.erro || 'Erro ao excluir.', 'error'); }
}

document.getElementById('btnNovoUsuarioEmpresa').addEventListener('click', () => {
  document.getElementById('novoUserEmpresaId').value = _empresaAtualId;
  document.getElementById('novoUserNome').value  = '';
  document.getElementById('novoUserEmail').value = '';
  document.getElementById('novoUserSenha').value = '';
  document.getElementById('novoUserRole').value  = 'company_admin';
  openModal('modalCriarUsuario');
});

document.getElementById('btnSalvarNovoUser').addEventListener('click', async () => {
  const empresaId = document.getElementById('novoUserEmpresaId').value;
  const body = {
    nome:  document.getElementById('novoUserNome').value.trim(),
    email: document.getElementById('novoUserEmail').value.trim(),
    senha: document.getElementById('novoUserSenha').value,
    role:  document.getElementById('novoUserRole').value,
  };
  if (!body.nome || !body.email || !body.senha) {
    toast('Preencha todos os campos obrigatórios.', 'error'); return;
  }
  const btn = document.getElementById('btnSalvarNovoUser');
  btn.disabled = true;
  try {
    await API.post(`/empresas/${empresaId}/usuarios`, body);
    closeModal('modalCriarUsuario');
    toast('Usuário criado com sucesso!', 'success');
    await recarregarUsuariosEmpresa();
    await carregarEmpresas();
  } catch (err) { toast(err.data?.erro || 'Erro ao criar usuário.', 'error'); }
  finally { btn.disabled = false; }
});
</script>
</body>
</html>
